<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#1e1f22',
                            bgLight: '#ffffff',
                            bgDark: '#131314'
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* Base styles to support proper scrolling and sticky elements */
        html, body {
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide scrollbar for clean UI but allow scrolling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(107, 114, 128, 0.8); }

        /* Custom text area auto-resize transition */
        textarea {
            resize: none;
            overflow-y: hidden;
            min-height: 44px;
            max-height: 200px;
        }

        .markdown-body pre {
            background-color: #1f2937 !important;
            color: #f3f4f6 !important;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }

        .markdown-body p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body class="bg-gemini-bgLight dark:bg-gemini-bgDark text-gray-800 dark:text-gray-200 min-h-[100dvh] flex flex-col font-sans transition-colors duration-200">

    <div id="loading" class="flex-1 flex flex-col items-center justify-center min-h-[100dvh]">
        <svg class="animate-spin h-8 w-8 text-blue-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <div class="text-lg font-medium text-gray-600 dark:text-gray-300">Loading App...</div>
    </div>

    <div id="app" class="hidden flex-1 flex w-full max-w-7xl mx-auto relative shadow-2xl bg-white dark:bg-[#1e1f22]">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 bg-gray-50 dark:bg-[#171717] border-r border-gray-200 dark:border-gray-800 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-4 flex items-center justify-between border-b border-gray-200 dark:border-gray-800">
                <button onclick="createNewChat()" class="flex-1 flex items-center gap-2 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 px-4 py-2.5 rounded-full shadow-sm border border-gray-200 dark:border-gray-700 transition-colors">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span class="font-medium text-sm">New chat</span>
                </button>
                <button class="md:hidden ml-2 p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200" onclick="toggleSidebar()">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
                <button onclick="toggleTheme()" class="w-full flex items-center gap-3 px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span>Toggle Theme</span>
                </button>
                <button onclick="openSettings()" class="w-full flex items-center gap-3 px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-white dark:bg-gemini-bgDark relative">
            <header class="sticky top-0 z-20 bg-white/80 dark:bg-gemini-bgDark/80 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-gray-100 dark:border-gray-800">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 id="current-chat-title" class="text-lg font-semibold text-gray-800 dark:text-gray-100 truncate">New Chat</h1>
                </div>
            </header>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 sm:p-6 pb-32">
                <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-75">
                    <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-500 rounded-2xl flex items-center justify-center mb-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">How can I help you today?</h2>
                    <p class="text-gray-500 dark:text-gray-400 max-w-md">I'm ready to assist with writing, coding, analysis, and more.</p>
                </div>
                
                <div id="chat-messages" class="flex flex-col space-y-6 max-w-4xl mx-auto hidden">
                    </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white via-white to-transparent dark:from-gemini-bgDark dark:via-gemini-bgDark pt-6 pb-4 px-4 sm:px-6">
                <div class="max-w-4xl mx-auto relative">
                    <div class="bg-gray-50 dark:bg-[#1e1f22] border border-gray-200 dark:border-gray-700 rounded-3xl p-2 flex items-end shadow-sm focus-within:ring-1 focus-within:ring-blue-500 transition-shadow">
                        <textarea id="message-input" rows="1" class="flex-1 bg-transparent border-0 focus:ring-0 resize-none py-2.5 px-4 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400 text-base" placeholder="Ask anything..."></textarea>
                        <button id="send-btn" onclick="handleSend()" class="p-3 m-1 bg-blue-500 hover:bg-blue-600 text-white rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                        </button>
                    </div>
                    <div class="text-center mt-2 text-xs text-gray-400 dark:text-gray-500">
                        AI can make mistakes. Check important info.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-2xl shadow-xl overflow-hidden transform transition-all flex flex-col max-h-[90dvh]">
            <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Settings</h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4 overflow-y-auto flex-1">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">OpenRouter API Key</label>
                    <input type="password" id="api-key" placeholder="sk-or-v1-..." class="w-full px-4 py-2 bg-white dark:bg-gray-950 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Model Name</label>
                    <input type="text" id="model-name" placeholder="deepseek/deepseek-r1:free" class="w-full px-4 py-2 bg-white dark:bg-gray-950 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">System Prompt</label>
                    <textarea id="system-prompt" rows="3" class="w-full px-4 py-2 bg-white dark:bg-gray-950 border border-gray-300 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-none"></textarea>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-200 dark:border-gray-800 flex justify-end gap-3">
                <button onclick="closeSettings()" class="px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors font-medium">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors font-medium shadow-sm">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const DEFAULT_SETTINGS = {
            apiKey: '',
            model: 'deepseek/deepseek-r1:free',
            systemPrompt: 'You are a highly intelligent, helpful, and concise AI assistant.',
            theme: 'light'
        };

        let chats = [];
        let currentChatId = null;
        let settings = { ...DEFAULT_SETTINGS };
        let isStreaming = false;
        let abortController = null;

        // --- DOM Elements ---
        const els = {
            app: document.getElementById('app'),
            loading: document.getElementById('loading'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            chatList: document.getElementById('chat-list'),
            chatMessages: document.getElementById('chat-messages'),
            welcomeScreen: document.getElementById('welcome-screen'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            currentChatTitle: document.getElementById('current-chat-title'),
            settingsModal: document.getElementById('settings-modal'),
            messagesContainer: document.getElementById('messages-container')
        };

        // --- Initialization ---
        function init() {
            try {
                // Load data from LocalStorage
                const savedSettings = localStorage.getItem('universal_ai_settings');
                if (savedSettings) settings = { ...settings, ...JSON.parse(savedSettings) };
                
                const savedChats = localStorage.getItem('universal_ai_chats');
                if (savedChats) chats = JSON.parse(savedChats);

                currentChatId = localStorage.getItem('universal_ai_current_chat');

                // Apply Theme immediately
                applyTheme(settings.theme);

                // Configure Marked.js safely
                if (typeof marked !== 'undefined') {
                    marked.setOptions({ breaks: true, gfm: true });
                }

                // Initial Renders
                renderChatList();
                if (chats.length === 0) {
                    createNewChat();
                } else {
                    if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
                        currentChatId = chats[0].id;
                    }
                    renderCurrentChat();
                }

                // Event Listeners
                setupEventListeners();

                // Show App, Hide Loading
                els.loading.classList.add('hidden');
                els.app.classList.remove('hidden');

                // Prompt for API key if missing
                if (!settings.apiKey) {
                    setTimeout(openSettings, 500);
                }
            } catch (error) {
                console.error("Initialization Error:", error);
                els.loading.innerHTML = `<div class="text-red-500 font-bold">Failed to load app. Check console.</div>`;
            }
        }

        // --- Core Logic ---
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        function saveData() {
            localStorage.setItem('universal_ai_chats', JSON.stringify(chats));
            localStorage.setItem('universal_ai_current_chat', currentChatId || '');
            localStorage.setItem('universal_ai_settings', JSON.stringify(settings));
        }

        function createNewChat() {
            if (isStreaming) return; // Prevent during stream
            const newChat = {
                id: generateId(),
                title: 'New Chat',
                messages: []
            };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveData();
            renderChatList();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar(); // auto-close sidebar on mobile
            els.messageInput.focus();
        }

        function selectChat(id) {
            if (isStreaming) return;
            currentChatId = id;
            saveData();
            renderChatList();
            renderCurrentChat();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            if (isStreaming && id === currentChatId) return;
            if (confirm("Delete this chat?")) {
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) {
                    createNewChat();
                } else if (currentChatId === id) {
                    currentChatId = chats[0].id;
                }
                saveData();
                renderChatList();
                renderCurrentChat();
            }
        }

        function renameChat(id, event) {
            event.stopPropagation();
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            const newName = prompt("Enter new chat name:", chat.title);
            if (newName !== null && newName.trim() !== '') {
                chat.title = newName.trim();
                saveData();
                renderChatList();
                if (currentChatId === id) els.currentChatTitle.textContent = chat.title;
            }
        }

        // --- Rendering ---
        function renderChatList() {
            els.chatList.innerHTML = chats.map(chat => `
                <div onclick="selectChat('${chat.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-colors ${chat.id === currentChatId ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300' : 'hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        <span class="truncate text-sm font-medium">${escapeHTML(chat.title)}</span>
                    </div>
                    <div class="flex items-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="renameChat('${chat.id}', event)" class="p-1.5 text-gray-400 hover:text-blue-500">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="deleteChat('${chat.id}', event)" class="p-1.5 text-gray-400 hover:text-red-500">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderCurrentChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            els.currentChatTitle.textContent = chat.title;
            
            if (chat.messages.length === 0) {
                els.welcomeScreen.classList.remove('hidden');
                els.chatMessages.classList.add('hidden');
                els.chatMessages.innerHTML = '';
            } else {
                els.welcomeScreen.classList.add('hidden');
                els.chatMessages.classList.remove('hidden');
                els.chatMessages.innerHTML = chat.messages.map(msg => createMessageHTML(msg.role, msg.content)).join('');
            }
            scrollToBottom();
        }

        function createMessageHTML(role, content) {
            const isUser = role === 'user';
            const htmlContent = isUser ? escapeHTML(content).replace(/\n/g, '<br>') : DOMPurifyMock(marked.parse(content || ''));
            
            if (isUser) {
                return `
                    <div class="flex justify-end w-full animate-fade-in">
                        <div class="bg-gemini-light dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-3xl rounded-tr-sm py-3 px-5 max-w-[85%] sm:max-w-[75%] break-words shadow-sm text-[15px] leading-relaxed">
                            ${htmlContent}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="flex justify-start w-full animate-fade-in">
                        <div class="flex items-start gap-3 sm:gap-4 max-w-full">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex-shrink-0 flex items-center justify-center text-white shadow-sm mt-1">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                            </div>
                            <div class="markdown-body prose prose-sm sm:prose-base dark:prose-invert max-w-[85%] sm:max-w-[85%] text-gray-800 dark:text-gray-200 leading-relaxed overflow-x-auto">
                                ${htmlContent}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function scrollToBottom() {
            setTimeout(() => {
                // Ensure the viewport scrolls to bottom if body is scrolling
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                // Also scroll container if needed
                els.messagesContainer.scrollTop = els.messagesContainer.scrollHeight;
            }, 50);
        }

        // --- Interaction & Streaming ---
        async function handleSend() {
            if (isStreaming) {
                if (abortController) abortController.abort();
                setStreamingState(false);
                return;
            }

            const text = els.messageInput.value.trim();
            if (!text) return;

            if (!settings.apiKey) {
                alert("Please set your OpenRouter API Key in settings first.");
                openSettings();
                return;
            }

            const chat = chats.find(c => c.id === currentChatId);
            if (!chat) return;

            // Generate title if first message
            if (chat.messages.length === 0) {
                chat.title = text.length > 30 ? text.substring(0, 30) + '...' : text;
                els.currentChatTitle.textContent = chat.title;
            }

            // Add User Message
            chat.messages.push({ role: 'user', content: text });
            els.messageInput.value = '';
            els.messageInput.style.height = 'auto'; // reset height
            saveData();
            
            // UI Updates
            els.welcomeScreen.classList.add('hidden');
            els.chatMessages.classList.remove('hidden');
            els.chatMessages.insertAdjacentHTML('beforeend', createMessageHTML('user', text));
            renderChatList(); // Update title in sidebar
            scrollToBottom();

            await streamAIResponse(chat);
        }

        async function streamAIResponse(chat) {
            setStreamingState(true);
            abortController = new AbortController();

            // Prepare messages for API (Sys prompt + History)
            const apiMessages = [
                { role: 'system', content: settings.systemPrompt || DEFAULT_SETTINGS.systemPrompt },
                ...chat.messages.map(m => ({ role: m.role, content: m.content }))
            ];

            // Create placeholder for AI message
            const placeholderId = 'msg-' + Date.now();
            const loadingHTML = `
                <div id="${placeholderId}" class="flex justify-start w-full">
                    <div class="flex items-start gap-4 max-w-full">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-purple-500 flex-shrink-0 flex items-center justify-center text-white shadow-sm mt-1">
                            <svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <div class="markdown-body prose prose-sm sm:prose-base dark:prose-invert max-w-full text-gray-800 dark:text-gray-200" id="${placeholderId}-content">
                            <span class="flex gap-1 items-center h-6 text-gray-400"><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></span><span class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></span></span>
                        </div>
                    </div>
                </div>
            `;
            els.chatMessages.insertAdjacentHTML('beforeend', loadingHTML);
            const contentEl = document.getElementById(`${placeholderId}-content`);
            scrollToBottom();

            let fullContent = '';
            chat.messages.push({ role: 'assistant', content: '' }); // stub

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${settings.apiKey}`
                    },
                    body: JSON.stringify({
                        model: settings.model || 'deepseek/deepseek-r1:free',
                        messages: apiMessages,
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`API Error: ${response.status} - ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // Keep incomplete line

                    for (let line of lines) {
                        line = line.trim();
                        if (!line || line === 'data: [DONE]') continue;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                const delta = data.choices[0]?.delta?.content || '';
                                if (delta) {
                                    fullContent += delta;
                                    // Update UI real-time
                                    contentEl.innerHTML = DOMPurifyMock(marked.parse(fullContent));
                                    scrollToBottom();
                                }
                            } catch (e) {
                                // Ignore unparseable chunks
                            }
                        }
                    }
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Streaming error:', error);
                    fullContent += `\n\n**Error:** ${error.message}`;
                    contentEl.innerHTML = DOMPurifyMock(marked.parse(fullContent));
                }
            } finally {
                // Save final message state
                chat.messages[chat.messages.length - 1].content = fullContent;
                saveData();
                setStreamingState(false);
                scrollToBottom();
            }
        }

        function setStreamingState(active) {
            isStreaming = active;
            if (active) {
                els.sendBtn.innerHTML = `<svg class="w-5 h-5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path></svg>`;
                els.sendBtn.classList.replace('bg-blue-500', 'bg-red-500');
                els.sendBtn.classList.replace('hover:bg-blue-600', 'hover:bg-red-600');
            } else {
                els.sendBtn.innerHTML = `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>`;
                els.sendBtn.classList.replace('bg-red-500', 'bg-blue-500');
                els.sendBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-600');
            }
        }

        // --- UI Interactions & Helpers ---
        function setupEventListeners() {
            // Textarea auto-resize & Enter to send
            els.messageInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            els.messageInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });
        }

        function toggleSidebar() {
            const sidebar = els.sidebar;
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function toggleTheme() {
            settings.theme = settings.theme === 'light' ? 'dark' : 'light';
            applyTheme(settings.theme);
            saveData();
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function openSettings() {
            document.getElementById('api-key').value = settings.apiKey;
            document.getElementById('model-name').value = settings.model;
            document.getElementById('system-prompt').value = settings.systemPrompt;
            els.settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            els.settingsModal.classList.add('hidden');
        }

        function saveSettings() {
            settings.apiKey = document.getElementById('api-key').value.trim();
            settings.model = document.getElementById('model-name').value.trim() || 'deepseek/deepseek-r1:free';
            settings.systemPrompt = document.getElementById('system-prompt').value.trim() || DEFAULT_SETTINGS.systemPrompt;
            saveData();
            closeSettings();
        }

        // Extremely basic escaping to prevent obvious breaks since no external DOMPurify allowed
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function DOMPurifyMock(dirty) {
            // Since we can't import DOMPurify per constraints, we rely on marked.js text rendering.
            // Avoid executing inline scripts.
            return dirty.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
        }

        // Boot
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
